services:
  - type: web
    name: neotoons-site
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
